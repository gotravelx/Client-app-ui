sonar.organization=ranjeetinfograins
sonar.projectKey=gotravelx-client
sonar.projectName=gotravelx-client

# Source directory (Next.js)
sonar.sources=.

# Exclude unnecessary directories from scan
sonar.exclusions=**/.next/**,**/node_modules/**,**/*.test.js,**/*.test.ts,**/*.test.tsx,**/coverage/**,**/__tests__/**,**/public/**

# Test files
sonar.tests=.
sonar.test.inclusions=**/*.test.js,**/*.test.ts,**/*.test.tsx,**/*.spec.js,**/*.spec.ts,**/*.spec.tsx

# Coverage report path (if you have Jest configured)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# SonarCloud host
sonar.host.url=https://sonarcloud.io
